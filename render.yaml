services:
  - type: web
    name: oorm-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: oorm-db
          property: connectionString

  - type: web
    name: oorm-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://oorm-backend.onrender.com/api

databases:
  - name: oorm-db
    plan: free
